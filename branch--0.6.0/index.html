     <script type="text/javascript">

      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>

    <script>
      // Set theme from localStorage before first paint to avoid flash.
      // Must set ALL four attributes (data-sb-theme + data-color-mode +
      // data-light-theme + data-dark-theme) so Primer's CSS variables
      // resolve correctly on the very first paint — Tailwind utilities
      // mapped to Primer vars (via tailwind-primer-adapter.css) depend on
      // data-color-mode being correct from the start.
      (function() {
        var stored = localStorage.getItem('sb-color-scheme');
        var theme = stored || 'system';
        var resolved = theme;
        if (theme === 'system') {
          resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        var el = document.documentElement;
        el.setAttribute('data-sb-theme', resolved);
        if (theme === 'system') {
          el.setAttribute('data-color-mode', 'auto');
          el.setAttribute('data-light-theme', 'light');
          el.setAttribute('data-dark-theme', 'dark');
        } else if (resolved.indexOf('dark') === 0) {
          el.setAttribute('data-color-mode', 'dark');
          el.setAttribute('data-dark-theme', resolved);
          el.setAttribute('data-light-theme', 'light');
        } else {
          el.setAttribute('data-color-mode', 'light');
          el.setAttribute('data-light-theme', resolved);
          el.setAttribute('data-dark-theme', 'dark');
        }
      })();
    </script>
